name: Docker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Read version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=${{ github.event_name == 'push' }}
            type=raw,value=${{ steps.version.outputs.VERSION }},enable=${{ github.event_name == 'push' }}
            type=sha,prefix=sha-,format=short

      - name: Build image (local)
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — container serves /healthz and SPA index
        run: |
          IMAGE=$(echo "${{ steps.meta.outputs.tags }}" | head -n1)
          docker run -d --name smoke -p 8080:8080 "$IMAGE"
          # Always dump logs + rm at the end, even on failure.
          trap 'echo "--- container logs ---"; docker logs smoke || true; echo "--- container state ---"; docker inspect -f "status={{.State.Status}} exit={{.State.ExitCode}} error={{.State.Error}}" smoke || true; docker rm -f smoke || true' EXIT
          # Wait up to ~15s for nginx to come up.
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/healthz >/dev/null 2>&1; then
              echo "healthz OK after ${i} tries"
              break
            fi
            sleep 0.5
          done
          curl -fsS http://127.0.0.1:8080/healthz
          # Index.html must be served by the SPA fallback.
          curl -fsS http://127.0.0.1:8080/ | grep -q '<div id="root"'

      - name: Verify bundle path for downstream consumers
        run: |
          IMAGE=$(echo "${{ steps.meta.outputs.tags }}" | head -n1)
          # foundry-mcp's Dockerfile COPY --from=... reaches into this
          # exact path. Fail loud here if it ever moves.
          docker run --rm --entrypoint sh "$IMAGE" -c \
            'test -f /usr/share/nginx/html/index.html && test -d /usr/share/nginx/html/assets'

      - name: Push image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
